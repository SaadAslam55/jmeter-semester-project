name: JMeter Performance Tests
on:
  push:
    branches: [ main ]
jobs:
  performance-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Download Apache JMeter
      run: |
        wget -q https://downloads.apache.org/jmeter/binaries/apache-jmeter-5.6.3.tgz
        tar -xzf apache-jmeter-5.6.3.tgz && mv apache-jmeter-5.6.3 jmeter

    - name: Run Performance Tests
      run: |
        mkdir -p results reports
        # Yeh command poori repo se aapki .jmx file khud dhoond legi, chahye woh kisi bhi folder mein ho!
        JMX_FILE=$(find . -name "*.jmx" | head -n 1)
        echo "Found JMX File: $JMX_FILE"
        
        jmeter/bin/jmeter -n \
          -t "$JMX_FILE" \
          -l results/results.jtl \
          -e -o reports/

    - name: Upload HTML Report as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: jmeter-report
        path: reports/
